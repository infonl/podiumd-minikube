# Service naming convention used throughout this file (must match the raw
# templates written in build order step 2): plain, unprefixed Service names
# in this chart's own namespace - postgres, redis, keycloak, solr, wiremock.
# podiumd's own nested apps are similarly reachable by their plain
# fullnameOverride (see below) since podiumd already sets each one to just
# the app's own name (confirmed via `helm show values dimpact/podiumd`),
# e.g. http://openzaak/, http://openklant/, http://pabc/.

# -----------------------------------------------------------------------
# Our own profile flags - compose-profile equivalents. Mirrors
# start-docker-compose.sh's own opt-in behavior (no flags = core stack only).
# -----------------------------------------------------------------------
zac:
  enabled: true # "zac" profile - on by default so the app is visible
itest:
  enabled: false # wiremocks (smartdocuments/kvk/bag), greenmail, opa-tests
objecten:
  enabled: false
opennotificaties:
  enabled: false
openarchiefbeheer:
  enabled: false
openformulieren:
  enabled: false # also pulls in objecten + objecttypen + opennotificaties
metrics:
  enabled: false

# -----------------------------------------------------------------------
# Raw templates this chart defines itself (Postgres/Redis/Keycloak/Solr/
# WireMock) - see build order step 2.
# -----------------------------------------------------------------------
postgres:
  # Referenced by the openzaak fixture SQL as psql -v variables, matching
  # docker-compose.yaml's openzaak-database service defaults exactly.
  bagApiClientUrl: https://api.bag.kadaster.nl/lvbag/individuelebevragingen/v2/
  bagApiKey: please-request-a-bag-api-key

# -----------------------------------------------------------------------
# The podiumd dependency and everything nested inside it.
# -----------------------------------------------------------------------
podiumd:
  enabled: true

  # --- Azure/production-specific pieces this chart doesn't use ---
  keycloak-operator:
    enabled: false # we run plain Keycloak instead - see templates/keycloak.yaml
  redis-operator:
    enabled: false # we run plain Redis instead - see templates/redis.yaml
  apisix:
    enabled: false # already false by default upstream, set explicitly for clarity
  zgw-office-addin:
    enabled: false
  ita:
    enabled: false
  kiss:
    enabled: false
  kiss-eck:
    enabled: false
  eck-operator:
    enabled: false
  omc:
    enabled: false
  clamav:
    enabled: false
  openinwoner:
    enabled: false
  referentielijsten:
    enabled: false
  openbeheer:
    enabled: false
  zaakbrug:
    enabled: false

  # --- zac (always on - the app itself) ---
  zac:
    enabled: true
    replicaCount: 1
    # Every image.tag below strips the upstream chart's own @sha256 digest
    # suffix, keeping just the tag. Verified live: minikube's image cache
    # (populated via `docker pull` + `minikube image load` on the host,
    # since this cluster has no outbound internet access at all) only
    # matches cleanly on tag-only references - kubelet's exact-reference
    # check for a digest-qualified image doesn't recognize a locally-loaded
    # tag-only image as satisfying it, and instead attempts a live network
    # pull, which always fails here. Content is identical either way (same
    # digest, just pulled via tag).
    image:
      tag: "5.0.1"
    global:
      curlImage:
        tag: "8.20.0"
    opa:
      image:
        tag: "1.17.1-static"
    office_converter:
      image:
        tag: "8.33.0"
    # nginx.enabled: true is podiumd's own override, production-specific -
    # the underlying zac chart's own default is actually false, matching
    # compose's single-container architecture (WildFly serves everything,
    # no separate nginx frontend). Disabling this restores that parity and
    # avoids the digest-matching issue for this image entirely.
    nginx:
      enabled: false
    autoscaling:
      enabled: false
    javaOptions: "-Xms512m -Xmx1024m -XX:ActiveProcessorCount=2"
    contextUrl: http://zac.local
    db:
      host: postgres
      name: zac
      user: zac
      password: password
    auth:
      server: http://keycloak:8080
      realm: zaakafhandelcomponent
      clientId: zaakafhandelcomponent
      secret: keycloakZaakafhandelcomponentClientSecret
      sslRequired: none
      # Verified against the actual zac chart version bundled inside podiumd
      # 4.8.1 (1.0.251, older than this repo's current charts/zac): its
      # config.yaml template has no AUTH_ENABLE_PKCE line at all - this
      # setting is a silent no-op on the currently-pinned podiumd version.
      # Left set anyway since it's harmless and matches compose's own intent;
      # takes effect automatically if a newer podiumd version bundles a zac
      # chart that supports it.
      #
      # Found live in step 4: this being a no-op is NOT harmless as assumed -
      # the vendored realm's "zaakafhandelcomponent" client requires PKCE
      # (pkce.code.challenge.method: S256, added upstream alongside PR #6490,
      # unreleased in any ZAC image tag yet), so with PKCE support actually
      # absent from this pinned image, Keycloak rejected every single login
      # with "invalid_request: Missing parameter: code_challenge_method".
      # Fixed on the Keycloak side instead - see
      # vendor/dimpact-zaakafhandelcomponent/NOTES.md's PKCE note for the
      # realm patch and revert-when-upgrading instructions.
      enablePkce: true
    keycloak:
      adminClient:
        id: zaakafhandelcomponent-admin-client
        secret: zaakafhandelcomponentAdminClientSecret
    gemeente:
      code: "9999"
      naam: FakeZacGemeente
      mail: gemeente-zac-test@example.com
    organizations:
      verantwoordelijke:
        rsin: "316245124"
      bron:
        rsin: "123443210"
    mail:
      smtp:
        server: in-v3.mailjet.com
        port: "587"
        username: fakeMailjetApiKey
        password: fakeMailjetApiSecretKey
    zgwApis:
      url: http://openzaak/
      clientId: zac_client
      secret: openzaakZaakafhandelcomponentClientSecret
    notificationsSecretKey: openNotificatiesApiSecretKey
    klantinteractiesApi:
      url: http://openklant
      token: fakeToken
    objectenApi:
      url: http://objecten
      token: fakeZacObjectsToken
    brpApi:
      url: http://wiremock:8080/haalcentraal/api/brp
      logLevel: INFO
      apiKey:
        # Compose defaults both BRP_API_KEY and BRP_API_KEY_HEADER to empty
        # (docker-compose.yaml lines 797-798) - ZAC's own BrpConfiguration
        # validation rejects a header set without a matching key, so these
        # must stay in lockstep, empty together.
        value: ""
        header: ""
      protocollering:
        enabled: true
        doelbinding:
          perZaaktype: true
          zoekmet: BRPACT-Totaal
          raadpleegmet: BRPACT-Totaal
          header: x-doelbinding
        originOin:
          oin: "123443210"
          header: x-origin-oin
        verwerking:
          register: Algemeen
          header: x-verwerking
        toepassing:
          value: ZAC
          header: x-toepassing
        gebruiker:
          header: x-gebruiker
        systemUser: ZacSystemUser
    kvkApi:
      url: fakeKvkApiUrl
      apiKey: fakeKvkApiKey
    bagApi:
      url: https://api.bag.kadaster.nl/lvbag/individuelebevragingen/v2/
      apiKey: fakeBagApiKey
    openForms:
      url: http://localhost:9999 # not used at the moment, matches compose's own placeholder
    pabcApi:
      url: http://pabc
      # Left empty, this is read by PabcClientHeadersFactory's companion
      # object via MicroProfile Config at class-init time - a missing value
      # throws NoSuchElementException there, which Java then caches forever
      # as "Could not initialize class ...PabcClientHeadersFactory" on every
      # later use (found live via the PabcReadinessHealthCheck). Matches
      # podiumd.pabc.settings.apiKeys (below) and compose's own
      # .env.example default.
      apiKey: zac-test-api-key
    zacInternalEndpointsApiKey: fakeZacInternalEndpointsApiKey
    smartDocuments:
      enabled: false
    signaleringen:
      deleteOlderThanDays: "14"
    solr:
      url: http://solr:8983
      # Verified live: createZacCore's initContainer uses the SolrCloud-only
      # Collections API (/solr/admin/collections), which fails against our
      # plain standalone Solr (no SolrCloud/Zookeeper). Our own Solr
      # Deployment runs "solr-precreate zac" at startup instead, matching
      # compose exactly - the core already exists by the time anything
      # needs it, without needing this initContainer at all.
      createZacCore: false
    solr-operator:
      enabled: false # podiumd's own override defaults this to true (unlike charts/zac's own quiet false default) - we use a plain Solr Deployment instead, see templates/solr.yaml
    opentelemetry-collector:
      enabled: false # renders unexpectedly without this override (verified via --set) even though charts/zac's own default is false - matches our own metrics.enabled=false profile flag; not otherwise wired to it since this is a separate, unrelated otel-collector instance from the one in templates/metrics/
    # Known, accepted limitation (not fixable via values): the bundled zac
    # chart version (1.0.251) hardcodes OTEL_SDK_DISABLED: "false" with no
    # override, and defaults OTEL_EXPORTER_OTLP_ENDPOINT to
    # http://<release>-opentelemetry-collector:4317 - a service that doesn't
    # exist since opentelemetry-collector.enabled is false above. ZAC's JVM
    # will harmlessly retry failed trace exports in the background (noisy
    # log warnings, no functional impact). No values-level fix exists for
    # this specific chart version.
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: zac.local
          paths:
            - path: /
              pathType: ImplementationSpecific

  # --- openzaak (always on - core) ---
  openzaak:
    enabled: true
    replicaCount: 1
    autoscaling:
      enabled: false
    # The bundled chart's own default (1.27.3) is older than the version
    # docker-compose.yaml pins (1.29.1) - our vendored fixture SQL does raw
    # INSERTs against this app's own tables, written against schema as of
    # 1.29.1, so the version matters for compatibility, not just parity.
    # openklant's bundled default (2.15.0) already matches compose exactly -
    # no override needed there.
    image:
      tag: "1.29.1"
    flower:
      enabled: false
    worker:
      replicaCount: 0 # compose only runs openzaak-celery under the opennotificaties/openformulieren profiles
    beat:
      replicaCount: 0 # compose never runs a separate openzaak beat/scheduler service at all
    # nginx.replicaCount left at its chart default (1) - compose runs
    # openzaak-nginx unconditionally (chunked transfer-encoding handling).
    # nginx.image.tag strips the digest suffix - see zac's own image.tag
    # comment above for why (verified live).
    nginx:
      image:
        tag: "1.31.1"
    tags:
      redis: false # point at the shared Redis instead of the chart's bundled one
    create_required_catalogi_job:
      enabled: false # defaults to true with literal placeholder credentials (<openzaak_client_id>/<openzaak_secret>) that would just fail repeatedly, and would try to create its own test zaaktype/catalog - our vendored SQL fixtures already seed this exact data, matching compose
    configuration:
      job:
        # Verified live: with no configuration.data set (matching compose,
        # which doesn't use django-setup-configuration for openzaak at all),
        # this Job's own management command exits with "CommandError: No
        # steps enabled, aborting." - disabling it entirely rather than
        # leaving a permanently-failing Job around.
        enabled: false
      # Matches docker-compose.yaml's DJANGO_SUPERUSER_PASSWORD/
      # OPENZAAK_SUPERUSER_USERNAME/OPENZAAK_SUPERUSER_EMAIL exactly. Found
      # live: left unset, the container never creates the 'admin' user our
      # vendored fixture-seeding script polls for
      # (`select count(id) from accounts_user where username = 'admin'`),
      # so the seed script waited forever and the ZGW API fixtures (zac's
      # own client credentials) never got applied - causing ZAC's boot-time
      # calls to Open Zaak to fail with a 403 invalid-client-identifier.
      superuser:
        username: admin
        password: admin
        email: noreply@example.com
    settings:
      # Matches docker-compose.yaml's openzaak.local value exactly. Found
      # live: left unset, Django refuses every request with
      # "ImproperlyConfigured: The SECRET_KEY setting must not be empty" -
      # same class of gap as openklant's secretKey fix above, just missed
      # for openzaak specifically in the initial pass.
      secretKey: openZaakSecretKey
      # Default ALLOWED_HOSTS only covers the chart's own in-cluster
      # fullname/namespace-qualified name (which already covers ZAC's
      # backend calls via the "openzaak" Service DNS name) - found live:
      # browsing via the Traefik Ingress hostname got Django's own
      # DisallowedHost 400 error page, since "openzaak.local" was never in
      # that list.
      allowedHosts: openzaak.local
      database:
        host: postgres
        port: 5432
        username: openzaak
        password: openzaak
        name: openzaak
      cache:
        default: redis:6379/0
        axes: redis:6379/0
      celery:
        brokerUrl: redis://redis:6379/1
        resultBackend: redis://redis:6379/1
    # Compose's openzaak.local service copies a vendored test PDF into
    # /app/private-media/uploads/2023/{10,11,12}/ before starting (see
    # copy-test-pdf-and-start-openzaak.sh, referenced by the
    # 07-setup-zac-config-after.sql fixture). This chart has no
    # initContainers/extraInitContainers support at all (checked its
    # deployment.yaml directly), but extraVolumes/extraVolumeMounts do exist
    # and are tpl-rendered - mounting the same ConfigMap-backed file via
    # subPath at all three target paths achieves the same result without
    # needing an initContainer.
    extraVolumes:
      - name: fake-test-document
        configMap:
          name: openzaak-fake-test-document
    extraVolumeMounts:
      - name: fake-test-document
        mountPath: /app/private-media/uploads/2023/10/fake-test-document.pdf
        subPath: fake-test-document.pdf
      - name: fake-test-document
        mountPath: /app/private-media/uploads/2023/11/fake-test-document.pdf
        subPath: fake-test-document.pdf
      - name: fake-test-document
        mountPath: /app/private-media/uploads/2023/12/fake-test-document.pdf
        subPath: fake-test-document.pdf
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: openzaak.local
          paths:
            - path: /
              pathType: ImplementationSpecific

  # --- openklant (always on - core) ---
  openklant:
    enabled: true
    replicaCount: 1
    autoscaling:
      enabled: false
    configuration:
      job:
        enabled: false # same "No steps enabled, aborting" issue as openzaak - see its own comment above
    flower:
      enabled: false
    worker:
      replicaCount: 0 # compose runs openklant as a single bare container, no celery worker at all
    # nginx.replicaCount left at its chart default (1), even though compose
    # runs openklant without one: verified directly that this chart's own
    # Ingress template hardwires its backend to the "<fullname>-nginx"
    # Service specifically (not configurable to point elsewhere), so
    # scaling nginx to 0 would make openklant.local completely unreachable.
    # nginx.image.tag strips the digest suffix - see zac's own image.tag
    # comment for why (verified live).
    nginx:
      image:
        tag: "1.31.1"
    tags:
      redis: false
    settings:
      # See openzaak's own allowedHosts comment above - same gap, same fix.
      allowedHosts: openklant.local
      database:
        host: postgres
        port: 5432
        username: openklant
        password: openklant
        name: openklant
      # Matches docker-compose.yaml's openklant.local value exactly (yes,
      # it really does reuse openzaak's own secret key literally - a
      # copy-paste artifact in compose itself, not something we introduced).
      secretKey: openZaakSecretKey
      cache:
        default: redis:6379/0
        axes: redis:6379/0
      celery:
        brokerUrl: redis://redis:6379/2
        resultBackend: redis://redis:6379/2
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: openklant.local
          paths:
            - path: /
              pathType: ImplementationSpecific

  # --- pabc (always on - core) ---
  pabc:
    enabled: true
    replicaCount: 1
    postgresql:
      enabled: false # point at the shared Postgres instead of the chart's bundled bitnami one
    # podiumd's own override remaps all three pabc images to a private Azure
    # Container Registry (acrprodmgmt.azurecr.io) with an IP allowlist -
    # confirmed via a direct pull attempt that it actively denies external
    # IPs. Overridden back to the pabc chart's own upstream defaults
    # (verified these pull successfully): the true public ghcr.io addresses.
    image:
      repository: ghcr.io/platform-autorisatie-beheer-component/pabc-api
      tag: "1.1.0"
    migrations:
      image:
        repository: ghcr.io/platform-autorisatie-beheer-component/pabc-migrations
        tag: "1.1.0"
      # Matches docker-compose.yaml's pabc-migrations JSON_DATASET_PATH
      # mount exactly. Found live: without this, PABC's own database has no
      # application/role/group mapping data at all, so ZAC's own
      # authorization check rejects every logged-in user with "Geen
      # toestemming" (403) regardless of their Keycloak group membership -
      # PABC, not Keycloak roles directly, is the actual source of truth
      # ZAC's authorization now queries.
      dataSetPath: /app/json/pabc-mapping-data.json
      extraVolumes:
        - name: pabc-mapping-data
          configMap:
            name: pabc-mapping-data
      extraVolumeMounts:
        - name: pabc-mapping-data
          subPath: pabc-mapping-data.json
          mountPath: /app/json/pabc-mapping-data.json
          readOnly: true
    initContainers:
      waitFor:
        image:
          repository: ghcr.io/groundnuty/k8s-wait-for
          tag: v2.0
    settings:
      database:
        host: postgres
        port: 5432
        username: pabc
        password: pabc
        name: Pabc
      apiKeys:
        - zac-test-api-key
      oidc:
        authority: http://keycloak:8080/realms/zaakafhandelcomponent/
        clientId: pabc
        clientSecret: pabcClientSecret
        functioneelBeheerderRole: administrator
        requireHttps: false # defaults to true - would reject our HTTP-only Keycloak's tokens entirely; matches compose's own Oidc__RequireHttps: "false"
      keycloakAdmin:
        clientId: pabc-admin-client
        clientSecret: pabcAdminClientSecret
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: pabc.local
          paths:
            - path: /
              pathType: ImplementationSpecific

  # --- brp-personen-mock (always on - core) ---
  brppersonenmock:
    enabled: true
    # No fullnameOverride/ingress overrides needed - this chart already
    # ships nameOverride: "brp-personen-mock" by default (verified via
    # `helm show values dimpact/brp-personen-mock`), matching the vendored
    # brp-personen-wiremock mapping's hardcoded proxyBaseUrl unchanged. Not
    # exposed via Ingress - compose reaches it only in-cluster, through the
    # wiremock proxy.

  # --- Profile-gated apps: enabled flags flip to true in step 5 wiring,
  # alongside their own settings.database/tags.redis/replicaCount overrides
  # and pre-provisioned storage hooks (see plan.md). Left disabled here. ---
  objecten:
    enabled: false
  objecttypen:
    enabled: false
  opennotificaties:
    enabled: false
  openarchiefbeheer:
    enabled: false
  openformulieren:
    enabled: false
