# Service naming convention used throughout this file (must match the raw
# templates written in build order step 2): plain, unprefixed Service names
# in this chart's own namespace - postgres, redis, keycloak, solr, wiremock.
# podiumd's own nested apps are similarly reachable by their plain
# fullnameOverride (see below) since podiumd already sets each one to just
# the app's own name (confirmed via `helm show values dimpact/podiumd`),
# e.g. http://openzaak/, http://openklant/, http://pabc/.

# -----------------------------------------------------------------------
# Our own profile flags - compose-profile equivalents. Mirrors
# start-docker-compose.sh's own opt-in behavior (no flags = core stack only).
# -----------------------------------------------------------------------
zac:
  enabled: true # "zac" profile - on by default so the app is visible
itest:
  enabled: false # wiremocks (smartdocuments/kvk/bag), greenmail, opa-tests
objecten:
  enabled: false
opennotificaties:
  enabled: false
openarchiefbeheer:
  enabled: false
openformulieren:
  enabled: false # also pulls in objecten + objecttypen + opennotificaties
metrics:
  enabled: false

# -----------------------------------------------------------------------
# Raw templates this chart defines itself (Postgres/Redis/Keycloak/Solr/
# WireMock) - see build order step 2.
# -----------------------------------------------------------------------
postgres:
  # Referenced by the openzaak fixture SQL as psql -v variables, matching
  # docker-compose.yaml's openzaak-database service defaults exactly.
  bagApiClientUrl: https://api.bag.kadaster.nl/lvbag/individuelebevragingen/v2/
  bagApiKey: please-request-a-bag-api-key

# -----------------------------------------------------------------------
# The podiumd dependency and everything nested inside it.
# -----------------------------------------------------------------------
podiumd:
  enabled: true

  # --- Azure/production-specific pieces this chart doesn't use ---
  keycloak-operator:
    enabled: false # we run plain Keycloak instead - see templates/keycloak.yaml
  redis-operator:
    enabled: false # we run plain Redis instead - see templates/redis.yaml
  apisix:
    enabled: false # already false by default upstream, set explicitly for clarity
  zgw-office-addin:
    enabled: false
  ita:
    enabled: false
  kiss:
    enabled: false
  kiss-eck:
    enabled: false
  eck-operator:
    enabled: false
  omc:
    enabled: false
  clamav:
    enabled: false
  openinwoner:
    enabled: false
  referentielijsten:
    enabled: false
  openbeheer:
    enabled: false
  zaakbrug:
    enabled: false

  # --- zac (always on - the app itself) ---
  zac:
    enabled: true
    replicaCount: 1
    # Every image.tag below strips the upstream chart's own @sha256 digest
    # suffix, keeping just the tag. Verified live: minikube's image cache
    # (populated via `docker pull` + `minikube image load` on the host,
    # since this cluster has no outbound internet access at all) only
    # matches cleanly on tag-only references - kubelet's exact-reference
    # check for a digest-qualified image doesn't recognize a locally-loaded
    # tag-only image as satisfying it, and instead attempts a live network
    # pull, which always fails here. Content is identical either way (same
    # digest, just pulled via tag).
    image:
      tag: "5.0.1"
    global:
      curlImage:
        tag: "8.20.0"
    opa:
      image:
        tag: "1.17.1-static"
    office_converter:
      image:
        tag: "8.33.0"
    # nginx.enabled: true is podiumd's own override, production-specific -
    # the underlying zac chart's own default is actually false, matching
    # compose's single-container architecture (WildFly serves everything,
    # no separate nginx frontend). Disabling this restores that parity and
    # avoids the digest-matching issue for this image entirely.
    nginx:
      enabled: false
    autoscaling:
      enabled: false
    javaOptions: "-Xms512m -Xmx1024m -XX:ActiveProcessorCount=2"
    contextUrl: http://zac.local
    db:
      host: postgres
      name: zac
      user: zac
      password: password
    auth:
      server: http://keycloak:8080
      realm: zaakafhandelcomponent
      clientId: zaakafhandelcomponent
      secret: keycloakZaakafhandelcomponentClientSecret
      sslRequired: none
      # Verified against the actual zac chart version bundled inside podiumd
      # 4.8.1 (1.0.251, older than this repo's current charts/zac): its
      # config.yaml template has no AUTH_ENABLE_PKCE line at all - this
      # setting is a silent no-op on the currently-pinned podiumd version.
      # Left set anyway since it's harmless and matches compose's own intent;
      # takes effect automatically if a newer podiumd version bundles a zac
      # chart that supports it.
      #
      # Found live in step 4: this being a no-op is NOT harmless as assumed -
      # the vendored realm's "zaakafhandelcomponent" client requires PKCE
      # (pkce.code.challenge.method: S256, added upstream alongside PR #6490,
      # unreleased in any ZAC image tag yet), so with PKCE support actually
      # absent from this pinned image, Keycloak rejected every single login
      # with "invalid_request: Missing parameter: code_challenge_method".
      # Fixed on the Keycloak side instead - see
      # vendor/dimpact-zaakafhandelcomponent/NOTES.md's PKCE note for the
      # realm patch and revert-when-upgrading instructions.
      enablePkce: true
    keycloak:
      adminClient:
        id: zaakafhandelcomponent-admin-client
        secret: zaakafhandelcomponentAdminClientSecret
    gemeente:
      code: "9999"
      naam: FakeZacGemeente
      mail: gemeente-zac-test@example.com
    organizations:
      verantwoordelijke:
        rsin: "316245124"
      bron:
        rsin: "123443210"
    mail:
      smtp:
        server: in-v3.mailjet.com
        port: "587"
        username: fakeMailjetApiKey
        password: fakeMailjetApiSecretKey
    zgwApis:
      url: http://openzaak/
      clientId: zac_client
      secret: openzaakZaakafhandelcomponentClientSecret
    notificationsSecretKey: openNotificatiesApiSecretKey
    klantinteractiesApi:
      url: http://openklant
      token: fakeToken
    objectenApi:
      url: http://objecten
      token: fakeZacObjectsToken
    brpApi:
      url: http://wiremock:8080/haalcentraal/api/brp
      logLevel: INFO
      apiKey:
        # Compose defaults both BRP_API_KEY and BRP_API_KEY_HEADER to empty
        # (docker-compose.yaml lines 797-798) - ZAC's own BrpConfiguration
        # validation rejects a header set without a matching key, so these
        # must stay in lockstep, empty together.
        value: ""
        header: ""
      protocollering:
        enabled: true
        doelbinding:
          perZaaktype: true
          zoekmet: BRPACT-Totaal
          raadpleegmet: BRPACT-Totaal
          header: x-doelbinding
        originOin:
          oin: "123443210"
          header: x-origin-oin
        verwerking:
          register: Algemeen
          header: x-verwerking
        toepassing:
          value: ZAC
          header: x-toepassing
        gebruiker:
          header: x-gebruiker
        systemUser: ZacSystemUser
    kvkApi:
      url: fakeKvkApiUrl
      apiKey: fakeKvkApiKey
    bagApi:
      url: https://api.bag.kadaster.nl/lvbag/individuelebevragingen/v2/
      apiKey: fakeBagApiKey
    openForms:
      url: http://localhost:9999 # not used at the moment, matches compose's own placeholder
    pabcApi:
      url: http://pabc
      # Left empty, this is read by PabcClientHeadersFactory's companion
      # object via MicroProfile Config at class-init time - a missing value
      # throws NoSuchElementException there, which Java then caches forever
      # as "Could not initialize class ...PabcClientHeadersFactory" on every
      # later use (found live via the PabcReadinessHealthCheck). Matches
      # podiumd.pabc.settings.apiKeys (below) and compose's own
      # .env.example default.
      apiKey: zac-test-api-key
    zacInternalEndpointsApiKey: fakeZacInternalEndpointsApiKey
    smartDocuments:
      enabled: false
    signaleringen:
      deleteOlderThanDays: "14"
    solr:
      url: http://solr:8983
      # Verified live: createZacCore's initContainer uses the SolrCloud-only
      # Collections API (/solr/admin/collections), which fails against our
      # plain standalone Solr (no SolrCloud/Zookeeper). Our own Solr
      # Deployment runs "solr-precreate zac" at startup instead, matching
      # compose exactly - the core already exists by the time anything
      # needs it, without needing this initContainer at all.
      createZacCore: false
    solr-operator:
      enabled: false # podiumd's own override defaults this to true (unlike charts/zac's own quiet false default) - we use a plain Solr Deployment instead, see templates/solr.yaml
    opentelemetry-collector:
      enabled: false # renders unexpectedly without this override (verified via --set) even though charts/zac's own default is false - this is a separate, unrelated bundled otel-collector subchart from the one in templates/metrics/, which is what we actually want ZAC's traces to go to instead
    # The bundled zac chart version (1.0.251) hardcodes OTEL_SDK_DISABLED:
    # "false" with no override, and would otherwise default
    # OTEL_EXPORTER_OTLP_ENDPOINT to http://<release>-opentelemetry-collector:4317
    # - the (disabled) bundled subchart above, not our own. Pointed at our
    # own templates/metrics/ otel-collector Service instead (step 5). When
    # metrics.enabled is false this Service doesn't exist either, so ZAC's
    # JVM just harmlessly retries failed trace exports in the background
    # (noisy log warnings, no functional impact) - same previously-accepted
    # behavior, now also the actually-working case once metrics is on.
    opentelemetry_zaakafhandelcomponent:
      endpoint: http://otel-collector:4317
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: zac.local
          paths:
            - path: /
              pathType: ImplementationSpecific

  # --- openzaak (always on - core) ---
  openzaak:
    enabled: true
    replicaCount: 1
    autoscaling:
      enabled: false
    # The bundled chart's own default (1.27.3) is older than the version
    # docker-compose.yaml pins (1.29.1) - our vendored fixture SQL does raw
    # INSERTs against this app's own tables, written against schema as of
    # 1.29.1, so the version matters for compatibility, not just parity.
    # openklant's bundled default (2.15.0) already matches compose exactly -
    # no override needed there.
    image:
      tag: "1.29.1"
    flower:
      enabled: false
    worker:
      replicaCount: 0 # compose only runs openzaak-celery under the opennotificaties/openformulieren profiles
    beat:
      replicaCount: 0 # compose never runs a separate openzaak beat/scheduler service at all
    # nginx.replicaCount left at its chart default (1) - compose runs
    # openzaak-nginx unconditionally (chunked transfer-encoding handling).
    # nginx.image.tag strips the digest suffix - see zac's own image.tag
    # comment above for why (verified live).
    nginx:
      image:
        tag: "1.31.1"
    tags:
      redis: false # point at the shared Redis instead of the chart's bundled one
    create_required_catalogi_job:
      enabled: false # defaults to true with literal placeholder credentials (<openzaak_client_id>/<openzaak_secret>) that would just fail repeatedly, and would try to create its own test zaaktype/catalog - our vendored SQL fixtures already seed this exact data, matching compose
    configuration:
      job:
        # Verified live: with no configuration.data set (matching compose,
        # which doesn't use django-setup-configuration for openzaak at all),
        # this Job's own management command exits with "CommandError: No
        # steps enabled, aborting." - disabling it entirely rather than
        # leaving a permanently-failing Job around.
        enabled: false
      # Matches docker-compose.yaml's DJANGO_SUPERUSER_PASSWORD/
      # OPENZAAK_SUPERUSER_USERNAME/OPENZAAK_SUPERUSER_EMAIL exactly. Found
      # live: left unset, the container never creates the 'admin' user our
      # vendored fixture-seeding script polls for
      # (`select count(id) from accounts_user where username = 'admin'`),
      # so the seed script waited forever and the ZGW API fixtures (zac's
      # own client credentials) never got applied - causing ZAC's boot-time
      # calls to Open Zaak to fail with a 403 invalid-client-identifier.
      superuser:
        username: admin
        password: admin
        email: noreply@example.com
    settings:
      # Matches docker-compose.yaml's openzaak.local value exactly. Found
      # live: left unset, Django refuses every request with
      # "ImproperlyConfigured: The SECRET_KEY setting must not be empty" -
      # same class of gap as openklant's secretKey fix above, just missed
      # for openzaak specifically in the initial pass.
      secretKey: openZaakSecretKey
      # Default ALLOWED_HOSTS only covers the chart's own in-cluster
      # fullname/namespace-qualified name (which already covers ZAC's
      # backend calls via the "openzaak" Service DNS name) - found live:
      # browsing via the Traefik Ingress hostname got Django's own
      # DisallowedHost 400 error page, since "openzaak.local" was never in
      # that list.
      allowedHosts: openzaak.local
      database:
        host: postgres
        port: 5432
        username: openzaak
        password: openzaak
        name: openzaak
      cache:
        default: redis:6379/0
        axes: redis:6379/0
      celery:
        brokerUrl: redis://redis:6379/1
        resultBackend: redis://redis:6379/1
    # Compose's openzaak.local service copies a vendored test PDF into
    # /app/private-media/uploads/2023/{10,11,12}/ before starting (see
    # copy-test-pdf-and-start-openzaak.sh, referenced by the
    # 07-setup-zac-config-after.sql fixture). This chart has no
    # initContainers/extraInitContainers support at all (checked its
    # deployment.yaml directly), but extraVolumes/extraVolumeMounts do exist
    # and are tpl-rendered - mounting the same ConfigMap-backed file via
    # subPath at all three target paths achieves the same result without
    # needing an initContainer.
    extraVolumes:
      - name: fake-test-document
        configMap:
          name: openzaak-fake-test-document
    extraVolumeMounts:
      - name: fake-test-document
        mountPath: /app/private-media/uploads/2023/10/fake-test-document.pdf
        subPath: fake-test-document.pdf
      - name: fake-test-document
        mountPath: /app/private-media/uploads/2023/11/fake-test-document.pdf
        subPath: fake-test-document.pdf
      - name: fake-test-document
        mountPath: /app/private-media/uploads/2023/12/fake-test-document.pdf
        subPath: fake-test-document.pdf
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: openzaak.local
          paths:
            - path: /
              pathType: ImplementationSpecific

  # --- openklant (always on - core) ---
  openklant:
    enabled: true
    replicaCount: 1
    autoscaling:
      enabled: false
    configuration:
      job:
        enabled: false # same "No steps enabled, aborting" issue as openzaak - see its own comment above
    flower:
      enabled: false
    worker:
      replicaCount: 0 # compose runs openklant as a single bare container, no celery worker at all
    # nginx.replicaCount left at its chart default (1), even though compose
    # runs openklant without one: verified directly that this chart's own
    # Ingress template hardwires its backend to the "<fullname>-nginx"
    # Service specifically (not configurable to point elsewhere), so
    # scaling nginx to 0 would make openklant.local completely unreachable.
    # nginx.image.tag strips the digest suffix - see zac's own image.tag
    # comment for why (verified live).
    nginx:
      image:
        tag: "1.31.1"
    tags:
      redis: false
    settings:
      # See openzaak's own allowedHosts comment above - same gap, same fix.
      allowedHosts: openklant.local
      database:
        host: postgres
        port: 5432
        username: openklant
        password: openklant
        name: openklant
      # Matches docker-compose.yaml's openklant.local value exactly (yes,
      # it really does reuse openzaak's own secret key literally - a
      # copy-paste artifact in compose itself, not something we introduced).
      secretKey: openZaakSecretKey
      cache:
        default: redis:6379/0
        axes: redis:6379/0
      celery:
        brokerUrl: redis://redis:6379/2
        # Set both: this chart's own configmap.yaml has a typo reading
        # "resultBackendl" (not "resultBackend") - found live while fixing
        # the same bug on openarchiefbeheer's chart (see that comment).
        # Currently a no-op in practice since openklant's own celery
        # worker is disabled (worker.replicaCount: 0 below) and nothing
        # reads this value, but fixed for correctness/future-proofing.
        resultBackend: redis://redis:6379/2
        resultBackendl: redis://redis:6379/2
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: openklant.local
          paths:
            - path: /
              pathType: ImplementationSpecific

  # --- pabc (always on - core) ---
  pabc:
    enabled: true
    replicaCount: 1
    postgresql:
      enabled: false # point at the shared Postgres instead of the chart's bundled bitnami one
    # podiumd's own override remaps all three pabc images to a private Azure
    # Container Registry (acrprodmgmt.azurecr.io) with an IP allowlist -
    # confirmed via a direct pull attempt that it actively denies external
    # IPs. Overridden back to the pabc chart's own upstream defaults
    # (verified these pull successfully): the true public ghcr.io addresses.
    image:
      repository: ghcr.io/platform-autorisatie-beheer-component/pabc-api
      tag: "1.1.0"
    migrations:
      image:
        repository: ghcr.io/platform-autorisatie-beheer-component/pabc-migrations
        tag: "1.1.0"
      # Matches docker-compose.yaml's pabc-migrations JSON_DATASET_PATH
      # mount exactly. Found live: without this, PABC's own database has no
      # application/role/group mapping data at all, so ZAC's own
      # authorization check rejects every logged-in user with "Geen
      # toestemming" (403) regardless of their Keycloak group membership -
      # PABC, not Keycloak roles directly, is the actual source of truth
      # ZAC's authorization now queries.
      dataSetPath: /app/json/pabc-mapping-data.json
      extraVolumes:
        - name: pabc-mapping-data
          configMap:
            name: pabc-mapping-data
      extraVolumeMounts:
        - name: pabc-mapping-data
          subPath: pabc-mapping-data.json
          mountPath: /app/json/pabc-mapping-data.json
          readOnly: true
    initContainers:
      waitFor:
        image:
          repository: ghcr.io/groundnuty/k8s-wait-for
          tag: v2.0
    settings:
      database:
        host: postgres
        port: 5432
        username: pabc
        password: pabc
        name: Pabc
      apiKeys:
        - zac-test-api-key
      oidc:
        authority: http://keycloak:8080/realms/zaakafhandelcomponent/
        clientId: pabc
        clientSecret: pabcClientSecret
        functioneelBeheerderRole: administrator
        requireHttps: false # defaults to true - would reject our HTTP-only Keycloak's tokens entirely; matches compose's own Oidc__RequireHttps: "false"
      keycloakAdmin:
        clientId: pabc-admin-client
        clientSecret: pabcAdminClientSecret
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: pabc.local
          paths:
            - path: /
              pathType: ImplementationSpecific

  # --- brp-personen-mock (always on - core) ---
  brppersonenmock:
    enabled: true
    # No fullnameOverride/ingress overrides needed - this chart already
    # ships nameOverride: "brp-personen-mock" by default (verified via
    # `helm show values dimpact/brp-personen-mock`), matching the vendored
    # brp-personen-wiremock mapping's hardcoded proxyBaseUrl unchanged. Not
    # exposed via Ingress - compose reaches it only in-cluster, through the
    # wiremock proxy.

  # --- Profile-gated apps (build order step 5). Each one's `enabled` flag
  # here is the one that actually controls whether podiumd renders it (its
  # own Chart.yaml `condition:` on the nested dependency) - the top-level
  # flags at the very top of this file (objecten.enabled, etc.) are this
  # chart's own compose-profile-equivalent flags, used by our own templates
  # (storage-hooks.yaml, the postgres seed script guard, the metrics/itest
  # raw templates below). Turning a profile on means flipping BOTH: the
  # top-level flag and this podiumd.<app>.enabled flag. Left disabled here,
  # matching compose's own opt-in-by-profile default. ---

  # --- objecten (+ objecttypen, its always-on dependency once either
  # profile is on) ---
  objecten:
    enabled: false
    replicaCount: 1
    # Found live: chart default (3.6.0) differs from compose's pinned
    # version (3.6.1) - matches the fixture/API shape our vendored SQL
    # expects. No digest suffix (unlike some other apps here) so no
    # separate digest-stripping fix is needed for this one.
    image:
      tag: "3.6.1"
    worker:
      # Compose runs objecten-api-celery as a real worker - unlike
      # openzaak/openklant's workers (which compose never runs at all), this
      # one stays on, just scaled down from the chart's default of 2.
      replicaCount: 1
    flower:
      enabled: false # not run in compose; chart default is true
    tags:
      redis: false
    configuration:
      job:
        # No configuration.data set (matching compose, which seeds fixture
        # data through a separate one-shot "objecten-api-import" container
        # running the image's own init.sh - not replicated here; see
        # plan.md's step 5 notes on scope).
        enabled: false
    settings:
      secretKey: objectenApiSecretKey
      allowedHosts: objecten.local
      database:
        host: postgres
        port: 5432
        # Compose's objecten-api-database container's actual Postgres
        # user/db is literally named "objects", not "objecten" - copied
        # as-is, matching 00-create-databases.sql.
        username: objects
        password: objects
        name: objects
      cache:
        default: redis:6379/0
        axes: redis:6379/0
        # Compose never sets an OIDC-cache env var for objecten either -
        # see opennotificaties's identical CACHE_OIDC comment above (same
        # unconditional-render leak, same fix).
        oidc: redis:6379/0
      celery:
        brokerUrl: redis://redis:6379/1
        # Set both: see openklant/openarchiefbeheer's identical comment -
        # this chart's own configmap.yaml has the same "resultBackendl" typo.
        resultBackend: redis://redis:6379/1
        resultBackendl: redis://redis:6379/1
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: objecten.local
          paths:
            - path: /
              pathType: ImplementationSpecific
    persistence:
      existingClaim: objecten
      storageClassName: ""
      size: 10Gi

  objecttypen:
    enabled: false
    replicaCount: 1
    # Digest-qualified chart default fails to pull in-cluster (no network
    # access) - same class of fix as zac/curlImage/etc in earlier steps.
    # Version (3.4.2) already matches compose; only the digest needed
    # stripping.
    image:
      tag: "3.4.2"
    # No worker/beat/flower/redis blocks exist on this chart at all - it's
    # a stateless API with no celery use.
    configuration:
      job:
        enabled: false # same fixture-import scope note as objecten above
    # podiumd's own umbrella override enables create_required_objecttypen_job
    # by default with placeholder credentials - same class of problem as
    # openzaak's create_required_catalogi_job (see that override's comment
    # above): would fail repeatedly against our vendored fixture data
    # instead of its own.
    create_required_objecttypen_job:
      enabled: false
    settings:
      secretKey: objecttypesApiSecretKey
      allowedHosts: objecttypen.local
      database:
        host: postgres
        port: 5432
        username: objecttypes
        password: objecttypes
        name: objecttypes
      cache:
        default: redis:6379/0
        axes: redis:6379/0
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: objecttypen.local
          paths:
            - path: /
              pathType: ImplementationSpecific

  # --- opennotificaties ---
  opennotificaties:
    enabled: false
    replicaCount: 1
    # Found live: chart default (1.16.0) differs from compose's pinned
    # version (1.15.0).
    image:
      tag: "1.15.0"
    worker:
      replicaCount: 1 # compose runs opennotificaties-celery as a real worker
    beat:
      replicaCount: 0 # compose has no opennotificaties beat container
    flower:
      enabled: false # already the chart default; explicit for clarity
    tags:
      redis: false
    configuration:
      job:
        enabled: false # see plan.md step 5 scope note - opennotificaties-init's setup-configuration data isn't replicated here
      superuser:
        # Matches compose's OPENNOTIFICATIES_SUPERUSER_USERNAME/_EMAIL and
        # DJANGO_SUPERUSER_PASSWORD exactly.
        username: admin
        password: admin
        email: admin@example.com
    settings:
      secretKey: opennotificatiesApiSecretKey
      allowedHosts: opennotificaties.local
      database:
        host: postgres
        port: 5432
        username: opennotificaties
        password: opennotificaties
        name: opennotificaties
      cache:
        default: redis:6379/0
        axes: redis:6379/0
        # Compose never sets an OIDC-cache env var for opennotificaties, but
        # this chart's configmap.yaml always renders CACHE_OIDC
        # unconditionally (no matching {{- if }} guard) - left unset, it
        # fell through to podiumd's own untouched production default
        # (redis-ha-master...). Pointed at the shared Redis instead of
        # leaving that leak in place.
        oidc: redis:6379/0
      celery:
        # Compose points this at rabbitmq, not redis - the only one of
        # these apps that does.
        brokerUrl: amqp://guest:guest@rabbitmq:5672//
        # PUBLISH_BROKER_URL has its own dedicated field (confirmed live
        # against secret.yaml) - matches compose's own value exactly.
        publishBrokerUrl: amqp://guest:guest@rabbitmq:5672/%2F
        # CELERY_RESULT_BACKEND is defined TWICE on this chart: once here
        # (feeding configmap.yaml's tags.redis-false branch) and once via
        # settings.messageBroker.celeryResultBackend below (feeding
        # secret.yaml). Found live: both the ConfigMap and Secret set the
        # same env var name via envFrom, and Kubernetes resolves that by
        # whichever source is listed last in the container's envFrom list
        # winning - rather than depend on that ordering, both are set here
        # to the same value so it's correct either way. Leaving only one
        # set left the other object rendering podiumd's own untouched
        # production default (redis-ha-master...) instead of ours.
        resultBackend: redis://redis:6379/1
      messageBroker:
        celeryResultBackend: redis://redis:6379/1
    # RABBITMQ_HOST has no dedicated values.yaml field on this chart at all
    # (confirmed - it isn't referenced anywhere in its templates), and isn't
    # needed: CELERY_BROKER_URL/PUBLISH_BROKER_URL above already carry the
    # full connection string the app actually uses.
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: opennotificaties.local
          paths:
            - path: /
              pathType: ImplementationSpecific
    persistence:
      existingClaim: opennotificaties
      storageClassName: ""
      size: 10Gi

  # --- openarchiefbeheer ---
  openarchiefbeheer:
    enabled: false
    # replicaCount/worker/beat/nginx/flower all already default to 1 - no
    # override needed (confirmed live against the chart: unlike the other
    # Maykin-family apps, this one's chart defaults already match compose's
    # single-instance topology exactly, including running celery/beat/flower
    # since compose really does run all of those as separate containers).
    # Digest-qualified defaults fail to pull in-cluster (no network access) -
    # same class of fix as zac/curlImage/etc in earlier steps. Versions
    # already match compose; only the digests needed stripping.
    image:
      tag: "2.0.0"
    nginx:
      image:
        tag: "1.31.1"
    tags:
      redis: false
    configuration:
      job:
        enabled: true # compose's openarchiefbeheer-web-init runs the equivalent setup-configuration step for real, unlike the other apps' fixture-import containers - replicated here via configuration.data below
      # Matches compose's vendored data.yaml (ZGW consumer services
      # pointing at ZAC's own openzaak client credentials), with API roots
      # repointed from openzaak.local:8000 to the in-cluster Service
      # address - see
      # vendor/dimpact-zaakafhandelcomponent/openarchiefbeheer/NOTES entry.
      # oidc_db_config_enable stays false, matching the vendored file - this
      # app's OIDC admin login isn't configured/needed for the admin login
      # form compose actually exercises (see settings.djangoSettingsModule
      # override below for how that login form is reached instead).
      data: |-
        zgw_consumers_config_enable: true
        zgw_consumers:
          services:
          - identifier: zaken-test
            label: Open Zaak - Zaken API
            api_root: http://openzaak/zaken/api/v1/
            api_type: zrc
            auth_type: zgw
            client_id: zac_client
            secret: openzaakZaakafhandelcomponentClientSecret
          - identifier: documenten-test
            label: Open Zaak - Documenten API
            api_root: http://openzaak/documenten/api/v1/
            api_type: drc
            auth_type: zgw
            client_id: zac_client
            secret: openzaakZaakafhandelcomponentClientSecret
          - identifier: catalogi-test
            label: Open Zaak - Catalogi API
            api_root: http://openzaak/catalogi/api/v1/
            api_type: ztc
            auth_type: zgw
            client_id: zac_client
            secret: openzaakZaakafhandelcomponentClientSecret
          - identifier: besluiten-test
            label: Open Zaak - Besluiten API
            api_root: http://openzaak/besluiten/api/v1/
            api_type: brc
            auth_type: zgw
            client_id: zac_client
            secret: openzaakZaakafhandelcomponentClientSecret
          - identifier: selectielijst
            label: Open Zaak (public) - Selectielijst API
            api_root: https://selectielijst.openzaak.nl/api/v1/
            api_type: orc
            auth_type: no_auth
        api_configuration_enabled: true
        api_configuration:
          selectielijst_service_identifier: selectielijst
        oidc_db_config_enable: false
    # Compose overrides DJANGO_SETTINGS_MODULE to a custom docker_no2fa
    # settings module (mounted from a vendored file) purely to disable
    # enforced two-factor auth on the admin login form - upstream only
    # reads DISABLE_2FA in a dev-only settings module that pulls in
    # django-debug-toolbar (not installed in this production image), so
    # that env var alone has no effect here. Replicated with the same
    # ConfigMap+extraVolumes+extraVolumeMounts pattern already used for
    # openzaak's fake-test-document.pdf.
    settings:
      djangoSettingsModule: openarchiefbeheer.conf.docker_no2fa
      secretKey: oabSecretKey
      # Both hostnames from the compose parity table (plan.md) need to be
      # here: this chart has only ONE native Ingress, and it routes
      # exclusively to the nginx sidecar, which itself proxies
      # /admin|oidc|static|assets|api/ to the backend and serves the SPA
      # for everything else - so both "hostnames" really are the same
      # nginx, just two Host-header entry points. Also feeds nginx's own
      # server_name directive (same mechanism as our raw templates).
      allowedHosts: openarchiefbeheer-web.local,openarchiefbeheer-ui.local
      database:
        host: postgres
        port: 5432
        username: openarchiefbeheer
        password: openarchiefbeheer
        name: openarchiefbeheer
      # Plain HTTP ingress (no TLS) - the chart's own secure-cookie
      # defaults (true) would make the browser silently refuse to send
      # session/CSRF cookies back at all over our http:// hostnames.
      cookie:
        sessionCookieSecure: false
        csrfCookieSecure: false
      cors:
        allowedOrigins: http://openarchiefbeheer-ui.local,http://openarchiefbeheer-web.local
      csrf:
        trustedOrigins: http://openarchiefbeheer-ui.local,http://openarchiefbeheer-web.local
      cache:
        default: redis:6379/0
        axes: redis:6379/0
        choices: redis:6379/0
      celery:
        brokerUrl: redis://redis:6379/0
        # Set both: this chart's own configmap.yaml has a typo reading
        # "resultBackendl" (not "resultBackend", which is what values.yaml
        # itself declares) - found live, confirmed directly against the
        # template. Setting only the correctly-spelled key would silently
        # leave CELERY_RESULT_BACKEND empty.
        resultBackend: redis://redis:6379/0
        resultBackendl: redis://redis:6379/0
      frontend:
        apiUrl: http://openarchiefbeheer-web.local
        apiPath: /api/v1
        zaakUrlTemplate: "https://zac.local/zaken/{identificatie}"
      frontendUrl: http://openarchiefbeheer-ui.local
      requestsReadTimeout: "5000"
    extraVolumes:
      - name: no2fa-settings
        configMap:
          name: openarchiefbeheer-no2fa-settings
    extraVolumeMounts:
      - name: no2fa-settings
        subPath: docker_no2fa.py
        mountPath: /app/src/openarchiefbeheer/conf/docker_no2fa.py
        readOnly: true
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: openarchiefbeheer-web.local
          paths:
            - path: /
              pathType: ImplementationSpecific
        - host: openarchiefbeheer-ui.local
          paths:
            - path: /
              pathType: ImplementationSpecific
    persistence:
      existingClaim: openarchiefbeheer
      storageClassName: ""
      size: 10Gi

  # --- openformulieren (aliased from the openforms chart) ---
  openformulieren:
    enabled: false
    # also pulls in objecten + objecttypen + opennotificaties (compose's
    # own "openformulieren" profile transitively enables all three - see
    # top-level openformulieren.enabled's comment).
    replicaCount: 1
    # Found live: chart default (3.4.9, digest-qualified - fails to pull
    # in-cluster anyway) differs from compose's pinned version (3.5.4).
    image:
      tag: "3.5.4"
    nginx:
      image:
        tag: "1.31.1" # digest stripped, same class of fix as above
      replicaCount: 1 # compose runs openformulieren-nginx
    worker:
      replicaCount: 1 # compose runs openformulieren-celery
    beat:
      replicaCount: 1 # compose runs openformulieren-celery-beat, unlike opennotificaties
    flower:
      enabled: false # chart default is true; not run in compose
    tags:
      redis: false
    configuration:
      job:
        enabled: false # see plan.md step 5 scope note - openformulieren-init's demo-data seeding (BRP service link, klantinteracties API group, importing the test form) isn't replicated here
      superuser:
        username: admin
        password: admin
        email: admin@example.com
    settings:
      secretKey: openFormulierenSecretKey
      allowedHosts: openformulieren-nginx.local,openformulieren-web.local
      database:
        host: postgres
        port: 5432
        username: openformulieren
        password: openformulieren
        name: openformulieren
      cache:
        default: redis:6379/2
        axes: redis:6379/2
        portalLocker: redis:6379/2
      celery:
        brokerUrl: redis://redis:6379/2
        # Set both: see openklant/objecten/openarchiefbeheer's identical
        # comment - this chart's own configmap.yaml has the same
        # "resultBackendl" typo.
        resultBackend: redis://redis:6379/2
        resultBackendl: redis://redis:6379/2
      csrf:
        trustedOrigins:
          - http://openformulieren-nginx.local
          - http://openformulieren-web.local
      cors:
        allowAllOrigins: true
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: openformulieren-nginx.local
          paths:
            - path: /
              pathType: ImplementationSpecific
        - host: openformulieren-web.local
          paths:
            - path: /
              pathType: ImplementationSpecific
    persistence:
      existingClaim: openformulieren
      storageClassName: ""
      size: 10Gi
