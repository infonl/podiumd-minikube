global:
  scrape_interval:     10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'prometheus'
    # Specify a fallback scrape protocol because the WildFly metrics endpoint
    # currently does not seem to specify a Content-Type header resulting in the following errors in the Prometheus logs:
    # "non-compliant scrape target sending blank Content-Type and no fallback_scrape_protocol specified for target"
    fallback_scrape_protocol: 'PrometheusText1.0.0'
    static_configs:
      # Patched from compose's "host.docker.internal:9990" (a host-level
      # port mapping that doesn't exist in-cluster) - zac's own Service
      # only forwards its app port (80), not the WildFly management port
      # (9990) the container also listens on, so this points at a small
      # extra Service (zac-admin) this chart adds just to expose it.
      - targets: [ 'zac-admin:9990' ]
  - job_name: 'tempo'
    static_configs:
      - targets: [ 'tempo:3200' ]
