{{/*
Pre-provisions a PersistentVolume + PersistentVolumeClaim for every
podiumd-nested app that has its own <app>-storage.yaml template hardcoding
the Azure Files CSI driver (openzaak, openklant, opennotificaties,
openarchiefbeheer, openformulieren, objecten) - see plan.md's "PodiumD's
Azure-CSI storage templates" section for why this is needed and how it works.

Named to match podiumd's own defaults exactly (verified: persistence.
existingClaim is already just the app name, persistence.size is already
10Gi for every one of these apps, including objecten - podiumd's own
override raises it from the objecten chart's own 1Gi default) - podiumd's
own <app>-storage.yaml then finds these already existing via its own
`lookup` checks and skips creating its broken Azure-CSI ones.

Note: this always creates a ReadWriteOnce PV/PVC pair, even though
podiumd's own competing Azure-CSI objects request ReadWriteMany. That's
deliberate, not a mismatch to fix: a single-replica app on a single-node
minikube VM never needs multi-writer access, and RWO is what minikube's
`standard`/hostPath-backed storage actually supports well. The two specs
*needing* to differ is exactly what makes Kubernetes' immutable-PVC-spec
check reject podiumd's competing objects on every subsequent `kubectl
apply` (verified live in step 4) - matching access modes would remove that
protection, not strengthen it.

Ranges over all six possible apps but only renders for whichever are
actually enabled, so turning on a profile flag in values.yaml (step 5) is
enough - no template changes needed later.
*/}}
{{- $apps := list "openzaak" "openklant" "opennotificaties" "openarchiefbeheer" "openformulieren" "objecten" }}
{{- range $app := $apps }}
{{- if (index $.Values.podiumd $app).enabled }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ $.Release.Namespace }}-{{ $app }}
  labels:
    {{- include "podiumd-minikube.labels" $ | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/resource-policy: keep
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /data/podiumd-minikube/{{ $app }}
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $app }}
  labels:
    {{- include "podiumd-minikube.labels" $ | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: {{ $.Release.Namespace }}-{{ $app }}
  resources:
    requests:
      storage: 10Gi
---
{{- end }}
{{- end }}
{{/*
DirectoryOrCreate hostPath volumes are created root:root 0755 - fine for
apps that only read/append existing files, but found live: openforms (UID
1000, non-root) needs to `cp -r` fresh static assets into its share of this
storage on every boot, and its chart has no initContainer field at all to
chown it first (unlike our own Solr/Postgres raw templates, which fix this
the same way via an in-pod busybox chown). Kubernetes' own fsGroup
mechanism doesn't reliably apply to bare hostPath-sourced PVs either
(confirmed live - the directory stayed root:root even with fsGroup: 1000 set).
One Job, not one per app, chmods every enabled app's volume to world-writable
- simplest fix that doesn't need to know each app's own UID/GID, and safe to
re-run (chmod is idempotent). Not annotated as a Helm hook since this whole
mechanism only runs via `kubectl apply` (see plan.md's Helm-hooks-don't-fire
note) - ordering comes from applying this file before the rest of the
manifest, same as the PV/PVC objects above.
*/}}
{{- $anyEnabled := false }}
{{- range $app := $apps }}{{- if (index $.Values.podiumd $app).enabled }}{{- $anyEnabled = true }}{{- end }}{{- end }}
{{- if $anyEnabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: storage-permissions-fix
  labels:
    {{- include "podiumd-minikube.labels" $ | nindent 4 }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: storage-permissions-fix
    spec:
      restartPolicy: Never
      containers:
        - name: chmod
          image: busybox:1.38.0
          command: ["sh", "-c", "chmod -R 0777 /mnt/*"]
          volumeMounts:
            {{- range $app := $apps }}
            {{- if (index $.Values.podiumd $app).enabled }}
            - name: {{ $app }}
              mountPath: /mnt/{{ $app }}
            {{- end }}
            {{- end }}
      volumes:
        {{- range $app := $apps }}
        {{- if (index $.Values.podiumd $app).enabled }}
        - name: {{ $app }}
          persistentVolumeClaim:
            claimName: {{ $app }}
        {{- end }}
        {{- end }}
{{- end }}
