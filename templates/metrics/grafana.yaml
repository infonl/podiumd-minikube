{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana
  labels:
    {{- include "podiumd-minikube.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    {{- include "podiumd-minikube.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate # single ReadWriteOnce volume - never run two pods at once
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
      annotations:
        checksum/datasources: {{ .Files.Get "vendor/dimpact-zaakafhandelcomponent/metrics/grafana-datasources.yaml" | sha256sum }}
    spec:
      enableServiceLinks: false
      containers:
        - name: grafana
          image: grafana/grafana:13.1.0
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: traceqlEditor
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/grafana-datasources.yaml
              subPath: grafana-datasources.yaml
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana
        - name: datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    {{- include "podiumd-minikube.labels" . | nindent 4 }}
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  labels:
    {{- include "podiumd-minikube.labels" . | nindent 4 }}
spec:
  ingressClassName: traefik
  rules:
    - host: grafana.local
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: grafana
                port:
                  name: http
{{- end }}
