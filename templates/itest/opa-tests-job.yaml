{{- if .Values.itest.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-tests-policies
  labels:
    {{- include "podiumd-minikube.labels" . | nindent 4 }}
data:
  {{- (.Files.Glob "vendor/dimpact-zaakafhandelcomponent/policies/main/*.rego").AsConfig | nindent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-tests-tests
  labels:
    {{- include "podiumd-minikube.labels" . | nindent 4 }}
data:
  {{- (.Files.Glob "vendor/dimpact-zaakafhandelcomponent/policies/test/*.rego").AsConfig | nindent 2 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: opa-tests
  labels:
    {{- include "podiumd-minikube.labels" . | nindent 4 }}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: opa-tests
    spec:
      enableServiceLinks: false
      restartPolicy: Never
      containers:
        - name: opa-tests
          image: openpolicyagent/opa:1.18.2
          args: ["test", "/home/policies", "/home/tests"]
          volumeMounts:
            # Found live: mounting the whole ConfigMap as one directory
            # makes `opa test`'s own recursive directory walk see each
            # .rego file three times (Kubernetes ConfigMap volumes expose
            # every file through the visible name, a "..data" symlink
            # target, and a timestamped directory - `opa test` doesn't know
            # to skip the hidden ones), producing "multiple default rules"
            # errors for rules that only exist once. Same per-file subPath
            # pattern as templates/wiremock/deployment.yaml avoids this
            # entirely - each mount is a single real file, no symlink
            # structure for the directory walk to trip over.
            {{- range $path, $_ := .Files.Glob "vendor/dimpact-zaakafhandelcomponent/policies/main/*.rego" }}
            - name: policies
              mountPath: /home/policies/{{ base $path }}
              subPath: {{ base $path }}
            {{- end }}
            {{- range $path, $_ := .Files.Glob "vendor/dimpact-zaakafhandelcomponent/policies/test/*.rego" }}
            - name: tests
              mountPath: /home/tests/{{ base $path }}
              subPath: {{ base $path }}
            {{- end }}
      volumes:
        - name: policies
          configMap:
            name: opa-tests-policies
        - name: tests
          configMap:
            name: opa-tests-tests
{{- end }}
