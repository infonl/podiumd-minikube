{{/*
Compose's own rabbitmq service is gated on the "opennotificaties"/
"openformulieren" profiles (the latter transitively enables opennotificaties
too, per docs) - opennotificaties.settings.celery.brokerUrl points at it
directly (amqp://guest:guest@rabbitmq:5672//), unlike every other app here
which uses the shared Redis instead. openformulieren itself never actually
uses rabbitmq (confirmed against its own compose env block - all redis) so
gating on podiumd.opennotificaties.enabled alone is correct: turning on the
openformulieren profile means also turning on opennotificaties manually
(see openformulieren.enabled's own comment), which brings this along too.
*/}}
{{- if .Values.podiumd.opennotificaties.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  labels:
    {{- include "podiumd-minikube.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      enableServiceLinks: false
      containers:
        - name: rabbitmq
          image: rabbitmq:4.2.7-alpine
          ports:
            - name: amqp
              containerPort: 5672
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  labels:
    {{- include "podiumd-minikube.labels" . | nindent 4 }}
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
{{- end }}
