{{/*
The itest-only mapping sets (smartdocuments/kvk/bag), mounted into the same
shared WireMock pod as brp-personen-wiremock's mappings - see
templates/wiremock/deployment.yaml's comment on why one pod, not four.
Split into per-set ConfigMaps (rather than one merged one) purely so each
set's own checksum/mappings annotation can track it independently, matching
the existing brp-personen-wiremock pattern.
*/}}
{{- if .Values.itest.enabled }}
{{- range $set := list "smartdocuments-wiremock" "kvk-wiremock" "bag-wiremock" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: wiremock-{{ $set }}-mappings
  labels:
    {{- include "podiumd-minikube.labels" $ | nindent 4 }}
data:
  {{- ($.Files.Glob (printf "vendor/dimpact-zaakafhandelcomponent/wiremocks/%s/mappings/*.json" $set)).AsConfig | nindent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wiremock-{{ $set }}-files
  labels:
    {{- include "podiumd-minikube.labels" $ | nindent 4 }}
data:
  {{- ($.Files.Glob (printf "vendor/dimpact-zaakafhandelcomponent/wiremocks/%s/__files/*.json" $set)).AsConfig | nindent 2 }}
binaryData:
  {{- range $path, $_ := $.Files.Glob (printf "vendor/dimpact-zaakafhandelcomponent/wiremocks/%s/__files/*" $set) }}
  {{- if not (hasSuffix ".json" $path) }}
  {{ base $path }}: {{ $.Files.Get $path | b64enc }}
  {{- end }}
  {{- end }}
---
{{- end }}
{{- end }}
